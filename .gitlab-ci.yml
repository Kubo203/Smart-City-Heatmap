stages:
  - build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_VERIFY: "1"
  DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"

  # Tag images by commit SHA (simple + unique)
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

# --------------------
# Build & Push Images
# --------------------
build:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--tls=true"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE/frontend:latest" -f frontend/Dockerfile.prod frontend
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$IMAGE_TAG"  -t "$CI_REGISTRY_IMAGE/backend:latest"  -f backend/Dockerfile.prod backend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/frontend:latest"
    - docker push "$CI_REGISTRY_IMAGE/backend:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE/backend:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --------------------
# Deploy on Server
# --------------------
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      # Debug (safe): shows whether variables exist
    - echo "SERVER_USER=[$SERVER_USER]"
    - echo "SERVER_HOST=[$SERVER_HOST]"
    - echo "SERVER_PATH=[$SERVER_PATH]"
    - test -n "$SERVER_USER" || (echo "SERVER_USER is empty (check GitLab Variables / duplicates / scope)" && exit 1)
    - test -n "$SERVER_PATH" || (echo "SERVER_PATH is empty" && exit 1)

    - |
      ssh "$SERVER_USER@$SERVER_HOST" sh -s << EOF
      set -e

      cd "$SERVER_PATH"

      # Write env file from GitLab Variables (do NOT commit this file)
      cat > .env.prod << ENVEOF
      NODE_ENV=production
      ENVIRONMENT=production
      LOG_LEVEL=info

      # Backend required
      PROJECT_NAME=${PROJECT_NAME:-Smart City Heatmap API}
      SECRET_KEY=$SECRET_KEY
      API_V1_STR=${API_V1_STR:-/api/v1}
      BACKEND_CORS_ORIGINS=$BACKEND_CORS_ORIGINS

      # Supabase required by backend
      SUPABASE_URL=$SUPABASE_URL
      SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY

      # Frontend API URL
      VITE_API_URL=$VITE_API_URL
      ENVEOF

      # Login to GitLab registry
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

      # Pull and run
      export IMAGE_TAG="$IMAGE_TAG"
      export DOCKER_REGISTRY="$CI_REGISTRY"
      export DOCKER_IMAGE_PREFIX="$CI_PROJECT_PATH"

      docker compose --env-file .env.prod -f docker-compose.prod.yml pull
      docker compose --env-file .env.prod -f docker-compose.prod.yml up -d

      docker compose -f docker-compose.prod.yml ps
      EOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  needs:
    - build
