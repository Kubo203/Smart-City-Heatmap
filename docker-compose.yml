services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/components.json:/app/components.json
      - ./frontend/eslint.config.js:/app/eslint.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_HOST: 0.0.0.0
      VITE_PORT: "3000"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_ENV: ${NODE_ENV:-development}
      NODE_ENV: ${NODE_ENV:-development}
    stdin_open: true
    tty: true
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Hot reload: mount backend source
      - ./backend:/app
    environment:
      # Match your FastAPI README/.env.example names
      PROJECT_NAME: ${PROJECT_NAME:-Smart City Heatmap API}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      API_V1_STR: ${API_V1_STR:-/api/v1}

      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      SECRET_KEY: ${SECRET_KEY}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}

      # Convenience
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    networks:
      - app-network
    restart: unless-stopped

volumes:
  frontend_node_modules:

networks:
  app-network:
    driver: bridge
